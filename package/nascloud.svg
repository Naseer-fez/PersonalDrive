<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Rounded corner clip for app icon shape -->
    <clipPath id="iconClip">
      <rect width="512" height="512" rx="80"/>
    </clipPath>

    <!-- Background diagonal gradient: olive-green top-left to slate-blue bottom-right -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#708A68"/>
      <stop offset="45%" stop-color="#607580"/>
      <stop offset="100%" stop-color="#4D6270"/>
    </linearGradient>

    <!-- Diagonal spotlight overlay from top-left corner -->
    <linearGradient id="spotlightGrad" x1="0" y1="0" x2="380" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#90A878" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#7A9070" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#607580" stop-opacity="0"/>
    </linearGradient>

    <!-- Green glow/bloom filter for the N chevron -->
    <filter id="nGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.66
                0 0 0 0 0.85
                0 0 0 0 0.31
                0 0 0 0 0.5 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Background fill -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- Diagonal spotlight triangle -->
    <polygon points="0,0 0,490 400,0" fill="url(#spotlightGrad)"/>

    <!-- Complete N letter — single continuous polyline, uniform stroke, behind the C -->
    <polyline points="90,380 185,160 280,380 320,130"
              fill="none"
              stroke="#A8D84E"
              stroke-width="36"
              stroke-linecap="round"
              stroke-linejoin="round"
              filter="url(#nGlow)"/>

    <!-- C letter — sits IN FRONT of the N -->
    <path d="M 389,172 A 120,120 0 1,0 389,368"
          fill="none"
          stroke="#2B4A6B"
          stroke-width="36"
          stroke-linecap="round"/>
  </g>
</svg>
